<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="50%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#4ecdc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
  </g>

  <!-- Fusion nodes -->
  <g filter="url(#glow)">
    <!-- Panel nodes -->
    <circle cx="250" cy="70" r="18" fill="#e94560" opacity="0.9"/>
    <circle cx="250" cy="100" r="18" fill="#f5a623" opacity="0.9"/>
    <circle cx="250" cy="130" r="18" fill="#4ecdc4" opacity="0.9"/>

    <!-- Judge node -->
    <circle cx="500" cy="100" r="22" fill="#e94560" opacity="0.9"/>

    <!-- Output node -->
    <circle cx="680" cy="100" r="16" fill="#4ecdc4" opacity="0.9"/>
  </g>

  <!-- Connection lines -->
  <g stroke="url(#accent)" stroke-width="2" opacity="0.6" fill="none">
    <line x1="268" y1="70" x2="478" y2="95"/>
    <line x1="268" y1="100" x2="478" y2="100"/>
    <line x1="268" y1="130" x2="478" y2="105"/>
    <line x1="522" y1="100" x2="664" y2="100"/>
  </g>

  <!-- Labels -->
  <text x="140" y="74" fill="#e94560" font-family="monospace" font-size="11" text-anchor="end">Groq 8B</text>
  <text x="140" y="104" fill="#f5a623" font-family="monospace" font-size="11" text-anchor="end">DeepSeek</text>
  <text x="140" y="134" fill="#4ecdc4" font-family="monospace" font-size="11" text-anchor="end">Gemma 4</text>
  <text x="430" y="95" fill="#e94560" font-family="monospace" font-size="11" text-anchor="end">Judge</text>
  <text x="720" y="104" fill="#4ecdc4" font-family="monospace" font-size="11" text-anchor="start">Answer</text>

  <!-- Title -->
  <text x="400" y="30" fill="#fff" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="3">PI FUSE PROVIDER</text>
  <text x="400" y="180" fill="#8899aa" font-family="monospace" font-size="12" text-anchor="middle" letter-spacing="1">Multi-model fusion · No server · Native Pi provider</text>
</svg>
